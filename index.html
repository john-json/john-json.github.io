<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ilstr01</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1, maximum-scale=1">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        /* ================================================ 
        Author: john-json
        Name: ilstr01-start-page
        URL: https://john-json.github.io
        Version: 0.0.2 (Fixed Light/Dark Mode)
        ================================================ */
        @import url("https://fonts.googleapis.com/css?family=Roboto+Mono:400,500");

        /* Global Variables for Theming */
        :root {
            --bg-color: #ffffff;
            --text-color: #1f1f1f;
            --link-color: #000000;
            --hover-color: #d2926a;
            --border-color: #bcbcbc;
            --shadow-color: rgba(0, 0, 0, 0.35);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1f1f1f;
                --text-color: #c5c5c5;
                --link-color: #ffffff;
                --hover-color: #d2926a;
                --border-color: #bcbcbc;
                --shadow-color: rgba(255, 255, 255, 0.35);
            }
        }

        html, body {
            font: 500 8px/1 "fonarto", Helvetica, sans-serif;
            line-height: 2.5;
            letter-spacing: 22px;
            color: var(--text-color);
            background: var(--bg-color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            margin: 6%;
            top: 2%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        img {
            max-height: 500px;
            position: relative;
        }

        /* Visibility Toggles */
        .only-on-dark { display: none; }
        .only-on-light { display: block; }

        @media (prefers-color-scheme: dark) {
            .only-on-dark { display: block; }
            .only-on-light { display: none; }
        }

        /* Search Bar */
        .search-bar {
            padding-bottom: 5px;
            align-items: center;
            bottom: -11px;
            border-bottom: 1px solid var(--border-color);
            width: 280px;
            left: 10%;
            font-size: 1rem;
        }

        .search {
            padding: 10px 0px;
            color: var(--text-color);
            background-color: transparent;
            border-style: none;
            width: 280px;
            height: 20px;
            align-items: center;
        }

        .search:hover,
        .search:focus {
            filter: drop-shadow(5px 8px 8px var(--shadow-color));
        }

        /* Clock */
        .clock {
            padding-top: 2%;
            width: 100%;
            height: 100%;
        }

        #realTimeClock, #realTimeDate {
            font-size: 2em;
            color: var(--text-color);
        }

        /* Weather */
        .weather {
            font-size: 1rem;
        }

        #city {
            padding-top: 1em;
            font-size: 2rem;
        }

        #temp {
            padding-top: 1em;
            font-size: 1rem;
        }

        /* Links */
        a {
            line-height: 2rem;
            color: var(--link-color);
            text-decoration: none;
            text-align: left;
            top: 1%;
            left: 10%;
            font-size: 1rem;
        }

        a:hover,
        a:focus {
            color: var(--hover-color);
        }

        ::-moz-focus-inner {
            padding: 0;
            border: 0;
        }

        :focus {
            outline: 0;
        }

        /* Sections */
        .main-text {
            position: sticky;
            bottom: 5%;
            left: 5em;
            max-width: 100px;
        }

        .section {
            z-index: 1;
            position: fixed;
            width: calc(100vw - 96px - 7em);
            display: flex;
            padding: 15%;
            box-sizing: border-box;
            min-height: 50vh;
        }

        .section-1 {
            position: fixed;
            bottom: 5%;
            right: 5%;
        }

        .section-2 {
            position: fixed;
            bottom: 0;
            max-width: 100px;
            left: 0;
        }

        .main-text-medium {
            font-size: 2em;
            letter-spacing: 22px;
        }

        /* Footer */
        .footer-links {
            line-height: 2.5;
            position: relative;
            left: 0%;
            background-color: transparent;
            padding: 0px;
        }

        .footer {
            position: absolute;
            left: auto;
            bottom: auto;
            padding: 0 7.5vw 7.5vw;
            align-items: flex-start;
        }

        /* Responsive Fixes */
        @media (max-width: 400px) {
            .logo {
                width: 100vw;
                height: 50vh;
            }

            .column-section-main {
                flex-direction: column;
            }
        }

        .column-section {
            flex-direction: column;
        }

        .col-section {
            width: 100%;
            max-width: 400px;
        }

        .list {
            margin-top: 2em;
            position: relative;
        }

        .list-item {
            margin-top: 0.25em;
            margin-bottom: 2em;
        }

        .list-item:last-child {
            margin-bottom: -0.4em;
        }
    </style>
</head>
<body>
    <h1 class="only-on-dark">Dark Mode</h1>
    <h1 class="only-on-light">Light Mode</h1>
</body>
</html>
