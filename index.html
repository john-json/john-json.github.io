function updateClock() {
	const weekday = {weekday: "short"};
	const monthday = {day: "numeric"};
	const dateElement = document.getElementById("realTimeDate");

	const currentDate = new Date();
	const formattedDate = currentDate.toLocaleDateString("en-EN", monthday);
	const formattedDay = currentDate.toLocaleDateString("en-EN", weekday);
	console.log(formattedDate); // Output: "2024-12-21" (or similar format)

	const clockElement = document.getElementById("realTimeClock");

	// Get current time
	const now = new Date();
	const hours = now.getHours().toString().padStart(2, "0");
	const minutes = now.getMinutes().toString().padStart(2, "0");

	// Format time
	const timeString = `${hours}${minutes}`;
	const dateString = `${formattedDate}${formattedDay}`;

	// Display time
	clockElement.textContent = timeString;
	dateElement.textContent = dateString;
}
// Initialize clock and update it every second

<script>
  function storeSearch(e) {
    if (e.key === "Enter") {
      const val = e.target.value.trim();
      if (!val) return;
      let existing = JSON.parse(localStorage.getItem("history") || "[]");
      if (!existing.includes(val)) {
        existing.unshift(val);
        if (existing.length > 10) existing.pop(); // Keep last 10
        localStorage.setItem("history", JSON.stringify(existing));
      }
    }
  }

  // Populate datalist from history
  document.addEventListener("DOMContentLoaded", () => {
    const history = JSON.parse(localStorage.getItem("history") || "[]");
    const dataList = document.getElementById("search-suggestions");
    history.forEach(item => {
      const opt = document.createElement("option");
      opt.value = item;
      dataList.appendChild(opt);
    });
  });
</script>
<script>
const apiKey = "026404d3de17740b166956b83f4563df";
const cityId = "2861650";

fetch(`https://api.openweathermap.org/data/2.5/weather?id=${cityId}&units=metric&lang=de&appid=${apiKey}`)
	.then((response) => response.json())
	.then((data) => {
		if (!data.main || data.main.temp === undefined) {
			console.error("Temperature data is missing.");
			return;
		}

		const city = data.name;
		const temp = Math.round(data.main.temp);

		console.log(`City: ${city}, Temperature: ${temp}`); // Debugging

		const cityElem = document.getElementById("city");
		const tempElem = document.getElementById("temp");

		if (cityElem) cityElem.textContent = city;
		if (tempElem) tempElem.textContent = temp;
	})
	.catch((error) => console.error("API Error:", error));
