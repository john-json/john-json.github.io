<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Light mode ── */
  :root {
    --bg: #f0eeeb;
    --glass-bg: rgba(255,255,255,0.55);
    --glass-border: rgba(0,0,0,0.08);
    --glass-shadow: 0 4px 32px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.06);
    --input-bg: rgba(0,0,0,0.055);
    --input-border: rgba(0,0,0,0.10);
    --input-focus-border: rgba(0,0,0,0.22);
    --text: #1a1917;
    --text-muted: rgba(26,25,23,0.38);
    --text-date: rgba(26,25,23,0.28);
    --sug-hover: rgba(0,0,0,0.06);
    --link-hover: rgba(0,0,0,0.05);
    --icon-filter: none;
    --clock-hh: #1a1917;
    --clock-mm: rgba(26,25,23,0.35);
    --divider: rgba(0,0,0,0.07);
  }

  /* ── Dark mode ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --glass-bg: rgba(28,27,25,0.72);
      --glass-border: rgba(255,255,255,0.07);
      --glass-shadow: 0 4px 40px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
      --input-bg: rgba(0,0,0,0.35);
      --input-border: rgba(255,255,255,0.07);
      --input-focus-border: rgba(255,255,255,0.18);
      --text: #e8e6e3;
      --text-muted: rgba(232,230,227,0.40);
      --text-date: rgba(232,230,227,0.22);
      --sug-hover: rgba(255,255,255,0.07);
      --link-hover: rgba(255,255,255,0.06);
      --icon-filter: none;
      --clock-hh: #e8e6e3;
      --clock-mm: rgba(232,230,227,0.30);
      --divider: rgba(255,255,255,0.06);
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s ease;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 50%, transparent 35%, rgba(0,0,0,0.18) 100%);
    pointer-events: none;
    z-index: 0;
  }

  @media (prefers-color-scheme: dark) {
    body::before {
      background: radial-gradient(ellipse 70% 55% at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%);
    }
  }

  .page {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    width: 100%;
    max-width: 640px;
  }

  /* ── Date + Weather header ── */
  .meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    user-select: none;
  }

  .meta-date {
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    color: var(--text-date);
  }

  .meta-weather {
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    color: var(--text-muted);
  }

  /* ── Glass card (search + icons combined) ── */
  .card {
    width: 100%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 1.25rem;
    box-shadow: var(--glass-shadow);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    padding: 0.85rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    width: 100%;
  }

  .search-wrap .search-icon {
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  .search-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 0.75rem;
    padding: 0.72rem 1rem 0.72rem 2.45rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--text);
    outline: none;
    transition: border-color 160ms ease, background 160ms ease;
  }

  .search-input::placeholder { color: var(--text-muted); }

  .search-input:focus {
    border-color: var(--input-focus-border);
    background: var(--input-bg);
  }

  /* suggestions */
  .suggestions {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 0.9rem;
    overflow: hidden;
    z-index: 50;
    display: none;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--glass-shadow);
  }

  .suggestions.open { display: block; }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.58rem 0.9rem;
    font-size: 0.84rem;
    color: var(--text);
    cursor: pointer;
    transition: background 100ms ease;
  }

  .suggestion-item svg { flex-shrink:0; color: var(--text-muted); width:13px; height:13px; }
  .suggestion-item:hover, .suggestion-item.active { background: var(--sug-hover); }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--divider);
    margin: 0.75rem 0;
  }

  /* ── Icon links ── */
  .links {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 0.1rem;
  }

  .link-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.32rem;
    text-decoration: none;
    cursor: pointer;
    border-radius: 0.6rem;
    padding: 0.45rem 0.5rem;
    transition: background 150ms ease, transform 150ms ease;
  }

  .link-item:hover {
    background: var(--link-hover);
    transform: translateY(-1px);
  }

  .link-item:active { transform: translateY(0); }

  .link-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .link-icon img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    display: block;
  }

  /* Light mode: invert white icons so they show on light bg */
  @media (prefers-color-scheme: light) {
    .link-icon img.invert-light {
      filter: invert(1) brightness(0.15);
    }
  }
  @media (prefers-color-scheme: dark) {
    .link-icon img.invert-dark {
      filter: invert(1);
    }
  }

  .link-label {
    font-size: 0.6rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* ── Clock ── */
  .clock {
    position: fixed;
    bottom: 2rem;
    right: 2.4rem;
    display: flex;
    align-items: baseline;
    line-height: 1;
    user-select: none;
    z-index: 1;
  }

  .clock-hh {
    font-size: clamp(3.2rem, 5.5vw, 5rem);
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--clock-hh);
    line-height: 1;
  }

  .clock-mm {
    font-size: clamp(3.2rem, 5.5vw, 5rem);
    font-weight: 300;
    letter-spacing: -0.04em;
    color: var(--clock-mm);
    line-height: 1;
  }
</style>
</head>
<body>

<div class="page">

  <!-- Date + weather -->
  <div class="meta">
    <div class="meta-date" id="meta-date">sun seventeenth</div>
    <div class="meta-weather">+4°c &nbsp;·&nbsp; feels like +5°c &nbsp;·&nbsp; sunny</div>
  </div>

  <!-- Glass card -->
  <div class="card">

    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        class="search-input"
        id="search"
        type="text"
        placeholder="Search..."
        autocomplete="off"
        spellcheck="false"
      >
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="divider"></div>

    <!-- Links -->
    <div class="links">
      <a class="link-item" href="https://reddit.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/reddit/FF4500" alt="Reddit" width="24" height="24" loading="lazy"></div>
        <span class="link-label">Reddit</span>
      </a>
      <a class="link-item" href="https://github.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/github/000000" alt="GitHub" width="24" height="24" loading="lazy" class="invert-dark"></div>
        <span class="link-label">GitHub</span>
      </a>
      <a class="link-item" href="https://youtube.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube" width="24" height="24" loading="lazy"></div>
        <span class="link-label">YouTube</span>
      </a>
      <a class="link-item" href="https://twitter.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/x/000000" alt="X" width="24" height="24" loading="lazy" class="invert-dark"></div>
        <span class="link-label">X</span>
      </a>
      <a class="link-item" href="https://vercel.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/vercel/000000" alt="Vercel" width="24" height="24" loading="lazy" class="invert-dark"></div>
        <span class="link-label">Vercel</span>
      </a>
      <a class="link-item" href="https://discord.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/discord/5865F2" alt="Discord" width="24" height="24" loading="lazy"></div>
        <span class="link-label">Discord</span>
      </a>
      <a class="link-item" href="https://figma.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/figma/F24E1E" alt="Figma" width="24" height="24" loading="lazy"></div>
        <span class="link-label">Figma</span>
      </a>
      <a class="link-item" href="https://open.spotify.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/spotify/1DB954" alt="Spotify" width="24" height="24" loading="lazy"></div>
        <span class="link-label">Spotify</span>
      </a>
      <a class="link-item" href="https://news.ycombinator.com" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/ycombinator/FF6600" alt="HN" width="24" height="24" loading="lazy"></div>
        <span class="link-label">HN</span>
      </a>
    </div>

  </div>
</div>

<!-- Clock -->
<div class="clock">
  <span class="clock-hh" id="clock-hh">00</span>
  <span class="clock-mm" id="clock-mm">00</span>
</div>

<script>
// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock-hh').textContent = String(now.getHours()).padStart(2,'0');
  document.getElementById('clock-mm').textContent = String(now.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 5000);

// ── Date ──
(function() {
  const ordinals = ['','first','second','third','fourth','fifth','sixth','seventh','eighth','ninth','tenth',
    'eleventh','twelfth','thirteenth','fourteenth','fifteenth','sixteenth','seventeenth','eighteenth',
    'nineteenth','twentieth','twenty‑first','twenty‑second','twenty‑third','twenty‑fourth',
    'twenty‑fifth','twenty‑sixth','twenty‑seventh','twenty‑eighth','twenty‑ninth',
    'thirtieth','thirty‑first'];
  const days = ['sun','mon','tue','wed','thu','fri','sat'];
  const now = new Date();
  document.getElementById('meta-date').textContent = days[now.getDay()] + ' ' + ordinals[now.getDate()];
})();

// ── Auto-focus search ──
window.addEventListener('load', () => { document.getElementById('search').focus(); });

// ── Google Suggestions ──
const input = document.getElementById('search');
const sugBox = document.getElementById('suggestions');
let activeIdx = -1;
let currentItems = [];

function openSuggestions(items) {
  currentItems = items;
  activeIdx = -1;
  if (!items.length) { sugBox.classList.remove('open'); return; }
  sugBox.innerHTML = items.map((s, i) => `
    <div class="suggestion-item" data-q="${s.replace(/"/g,'&quot;')}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      ${s}
    </div>`).join('');
  sugBox.classList.add('open');
  sugBox.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); });
    el.addEventListener('click', () => {
      window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(el.dataset.q);
    });
  });
}

let debounceTimer;
input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = input.value.trim();
  if (!q) { sugBox.classList.remove('open'); currentItems=[]; return; }
  debounceTimer = setTimeout(() => {
    const script = document.createElement('script');
    window.__gacb = function(data) {
      openSuggestions(data[1].map(x => x[0]).slice(0, 6));
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    script.src = 'https://suggestqueries.google.com/complete/search?client=firefox&q=' + encodeURIComponent(q) + '&callback=__gacb';
    document.head.appendChild(script);
  }, 200);
});

input.addEventListener('keydown', e => {
  const els = sugBox.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, currentItems.length - 1);
    els.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) input.value = currentItems[activeIdx];
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, -1);
    els.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) input.value = currentItems[activeIdx];
  } else if (e.key === 'Enter') {
    const q = activeIdx >= 0 ? currentItems[activeIdx] : input.value.trim();
    if (q) window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
  } else if (e.key === 'Escape') {
    sugBox.classList.remove('open'); activeIdx = -1;
  }
});

document.addEventListener('click', e => {
  if (!input.contains(e.target) && !sugBox.contains(e.target)) sugBox.classList.remove('open');
});
</script>
</body>
</html>
