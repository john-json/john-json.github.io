<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ilstr01</title>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1, maximum-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url("https://fonts.googleapis.com/css?family=Roboto+Mono:400,500");

        /* Root Variables for Easy Theme Switching */
        :root {
            --background-color: #ffffff;
            --text-color: #1f1f1f;
            --link-color: #1f1f1f;
            --border-color: #bcbcbc;
        }

        /* Dark Mode Overrides */
        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #1f1f1f;
                --text-color: #c5c5c5;
                --link-color: white;
                --border-color: #bcbcbc;
            }
        }

        html {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            overflow: hidden;
        }

        body {
            font: 500 8px/1 "fonarto", Helvetica, sans-serif;
            line-height: 2.5;
            letter-spacing: 22px;
            color: var(--text-color);
            background: var(--background-color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            margin: 6%;
            top: 2%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        img {
            max-height: 500px;
            position: relative;
        }

        .only-on-dark {
            display: none;
        }

        .only-on-light {
            display: block;
        }

        @media (prefers-color-scheme: dark) {
            .only-on-dark {
                display: block;
            }
            .only-on-light {
                display: none;
            }
        }

        .fav-links {
            padding-top: 22px;
        }

        .search-bar {
            padding-bottom: 5px;
            align-items: center;
            bottom: -11px;
            border-bottom: 1px solid var(--border-color);
            width: 280px;
            left: 10%;
            font-size: 1rem;
        }

        .search {
            padding: 10px 0px;
            color: var(--text-color);
            background-color: transparent;
            border-style: none;
            width: 280px;
            height: 20px;
            align-items: center;
        }

        .search:hover {
            filter: drop-shadow(0px 8px 8px #00000059);
        }

        .search:focus {
            filter: drop-shadow(5px 8px 8px #00000059);
        }

        .clock {
            padding-top: 2%;
            width: 100%;
            height: 100%;
        }

        #realTimeClock {
            font-size: 2em;
            color: var(--text-color);
        }

        #realTimeDate {
            font-size: 1rem;
            color: var(--text-color);
        }

        .weather {
            font-size: 1rem;
        }

        #city {
            padding-top: 1em;
            font-size: 2rem;
        }

        #temp {
            padding-top: 1em;
            font-size: 1rem;
        }

        p {
            margin: 0;
            padding: 0;
        }

        a {
            line-height: 2rem;
            color: var(--link-color);
            text-decoration: none;
            text-align: left;
            top: 1%;
            left: 10%;
            font-size: 1rem;
        }

        a:hover, a:focus {
            color: #d2926a;
        }

        .main-text {
            position: sticky;
            bottom: 5%;
            left: 5em;
            max-width: 100px;
        }

        .section {
            z-index: 1;
            position: fixed;
            width: calc(100vw - 96px - 7em);
            display: flex;
            padding: 15%;
            box-sizing: border-box;
            min-height: 50vh;
        }

        .section-1 {
            position: fixed;
            bottom: 5%;
            right: 5%;
        }

        .section-2 {
            position: fixed;
            bottom: 0;
            max-width: 100px;
            left: 0;
        }

        .main-text-medium {
            font-size: 2em;
            letter-spacing: 22px;
        }

        @media (max-width: 400px) {
            .logo {
                width: 100vw;
                height: 50vh;
            }

            .column-section-main {
                flex-direction: column;
            }
        }

        .column-section {
            flex-direction: column;
        }

        .col-section {
            width: 100%;
            max-width: 400px;
        }

        .list {
            margin-top: 2em;
            position: relative;
        }

        .list-item {
            margin-top: 0.25em;
            margin-bottom: 2em;
        }

        .list-item:last-child {
            margin-bottom: -0.4em;
        }

        .footer-links {
            line-height: 2.5;
            position: relative;
            left: 0%;
            padding: 0px;
        }

        .footer {
            position: absolute;
            left: auto;
            bottom: auto;
            padding: 0 7.5vw 7.5vw;
            align-items: flex-start;
        }

        .footer-links {
            display: inline;
        }

        @media (hover: hover) {
            .footer-links:nth-child(odd):hover ~ .scrunch {
                background-color: #a1a1a1;
            }

            .footer-links:nth-child(2n):hover ~ .scrunch {
                background-color: #3a3a3a;
            }

            .link-email:hover ~ .scrunch:after {
                animation: one 1s 0.25s linear forwards;
            }

            .link-behance:hover ~ .scrunch:after {
                animation: two 1s 0.25s linear forwards;
            }

            .link-dribbble:hover ~ .scrunch:after {
                animation: three 1s 0.25s linear forwards;
            }

            .link-linkedin:hover ~ .scrunch:after {
                animation: four 1s 0.25s linear forwards;
            }

            .link-twitter:hover ~ .scrunch:after {
                animation: five 1s 0.25s linear forwards;
            }

            .link-instagram:hover ~ .scrunch:after {
                animation: six 1s 0.25s linear forwards;
            }

            .link-site:hover ~ .scrunch:after {
                animation: seven 1s 0.25s linear forwards;
            }
        }
    </style>
</head>
<body>
    <h1 class="only-on-light">Light Mode</h1>
    <h1 class="only-on-dark">Dark Mode</h1>
</body>
</html>
